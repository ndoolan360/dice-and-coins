<!DOCTYPE html>
<title>Dice and Coins</title>
<link rel="stylesheet" href="./styles/dice-and-coins.css" />
<script defer src="./src/main.js" type="module"></script>

<noscript>You need to enable Javascript to run this app.</noscript>

<nav id="tabs" aria-label="Tool tabs">
  <a href="#dice" id="tab-dice">Dice</a>
  <a href="#coin" id="tab-coin">Coin</a>
  <a href="#number" id="tab-number">Number</a>
  <a href="#history" id="tab-history">History</a>
</nav>

<div id="tab-content">

  <section id="dice" aria-label="Dice roller">
    <ul id="dice-tray" aria-label="Dice to roll" aria-live="polite">
      <template id="d4-template">
        <li class="die-wrapper" role="group" aria-label="Die">
          <span class="die d4" role="img" aria-label="Four-sided die">
            <span class="face-1">1</span>
            <span class="face-2">2</span>
            <span class="face-3">3</span>
            <span class="face-4">4</span>
          </span>
          <button type="button" class="die-roll-single" aria-label="Roll this die">Roll</button>
          <button type="button" class="die-remove" aria-label="Remove die">×</button>
          <button type="button" class="die-lock" aria-label="Lock die" aria-pressed="false">🔒</button>
        </li>
      </template>
      <template id="d6-template">
        <li class="die-wrapper" role="group" aria-label="Die">
          <span class="die d6" role="img" aria-label="Six-sided die">
            <span class="face-1">1</span>
            <span class="face-2">2</span>
            <span class="face-3">3</span>
            <span class="face-4">4</span>
            <span class="face-5">5</span>
            <span class="face-6">6</span>
          </span>
          <button type="button" class="die-roll-single" aria-label="Roll this die">Roll</button>
          <button type="button" class="die-remove" aria-label="Remove die">×</button>
          <button type="button" class="die-lock" aria-label="Lock die" aria-pressed="false">🔒</button>
        </li>
      </template>
      <template id="d8-template">
        <li class="die-wrapper" role="group" aria-label="Die">
          <span class="die d8" role="img" aria-label="Eight-sided die">
            <span class="face-1">1</span>
            <span class="face-2">2</span>
            <span class="face-3">3</span>
            <span class="face-4">4</span>
            <span class="face-5">5</span>
            <span class="face-6">6</span>
            <span class="face-7">7</span>
            <span class="face-8">8</span>
          </span>
          <button type="button" class="die-roll-single" aria-label="Roll this die">Roll</button>
          <button type="button" class="die-remove" aria-label="Remove die">×</button>
          <button type="button" class="die-lock" aria-label="Lock die" aria-pressed="false">🔒</button>
        </li>
      </template>
      <template id="d10-template">
        <li class="die-wrapper" role="group" aria-label="Die">
          <span class="die d10" role="img" aria-label="Ten-sided die">
            <span class="face-1">1</span>
            <span class="face-2">2</span>
            <span class="face-3">3</span>
            <span class="face-4">4</span>
            <span class="face-5">5</span>
            <span class="face-6">6</span>
            <span class="face-7">7</span>
            <span class="face-8">8</span>
            <span class="face-9">9</span>
            <span class="face-10">10</span>
          </span>
          <button type="button" class="die-roll-single" aria-label="Roll this die">Roll</button>
          <button type="button" class="die-remove" aria-label="Remove die">×</button>
          <button type="button" class="die-lock" aria-label="Lock die" aria-pressed="false">🔒</button>
        </li>
      </template>
      <template id="d%-template">
        <li class="die-wrapper" role="group" aria-label="Die">
          <span class="die d10" data-type="d%" role="img" aria-label="Percentile die">
            <span class="face-1">10</span>
            <span class="face-2">20</span>
            <span class="face-3">30</span>
            <span class="face-4">40</span>
            <span class="face-5">50</span>
            <span class="face-6">60</span>
            <span class="face-7">70</span>
            <span class="face-8">80</span>
            <span class="face-9">90</span>
            <span class="face-10">0</span>
          </span>
          <button type="button" class="die-roll-single" aria-label="Roll this die">Roll</button>
          <button type="button" class="die-remove" aria-label="Remove die">×</button>
          <button type="button" class="die-lock" aria-label="Lock die" aria-pressed="false">🔒</button>
        </li>
      </template>
      <template id="d12-template">
        <li class="die-wrapper" role="group" aria-label="Die">
          <span class="die d12" role="img" aria-label="Twelve-sided die">
            <span class="face-1">1</span>
            <span class="face-2">2</span>
            <span class="face-3">3</span>
            <span class="face-4">4</span>
            <span class="face-5">5</span>
            <span class="face-6">6</span>
            <span class="face-7">7</span>
            <span class="face-8">8</span>
            <span class="face-9">9</span>
            <span class="face-10">10</span>
            <span class="face-11">11</span>
            <span class="face-12">12</span>
          </span>
          <button type="button" class="die-roll-single" aria-label="Roll this die">Roll</button>
          <button type="button" class="die-remove" aria-label="Remove die">×</button>
          <button type="button" class="die-lock" aria-label="Lock die" aria-pressed="false">🔒</button>
        </li>
      </template>
      <template id="d20-template">
        <li class="die-wrapper" role="group" aria-label="Die">
          <span class="die d20" role="img" aria-label="Twenty-sided die">
            <span class="face-1">1</span>
            <span class="face-2">2</span>
            <span class="face-3">3</span>
            <span class="face-4">4</span>
            <span class="face-5">5</span>
            <span class="face-6">6</span>
            <span class="face-7">7</span>
            <span class="face-8">8</span>
            <span class="face-9">9</span>
            <span class="face-10">10</span>
            <span class="face-11">11</span>
            <span class="face-12">12</span>
            <span class="face-13">13</span>
            <span class="face-14">14</span>
            <span class="face-15">15</span>
            <span class="face-16">16</span>
            <span class="face-17">17</span>
            <span class="face-18">18</span>
            <span class="face-19">19</span>
            <span class="face-20">20</span>
          </span>
          <button type="button" class="die-roll-single" aria-label="Roll this die">Roll</button>
          <button type="button" class="die-remove" aria-label="Remove die">×</button>
          <button type="button" class="die-lock" aria-label="Lock die" aria-pressed="false">🔒</button>
        </li>
      </template>
    </ul>
    <output id="dice-result" aria-live="polite" aria-atomic="true" aria-label="Roll result">
      <span id="dice-sum"></span>
      <span id="dice-breakdown"></span>
    </output>
    <form id="dice-controls">
      <fieldset id="dice-selector">
        <legend class="sr-only">Add dice</legend>
        <button type="button" data-die="d4">+d4</button>
        <button type="button" data-die="d6">+d6</button>
        <button type="button" data-die="d8">+d8</button>
        <button type="button" data-die="d10">+d10</button>
        <button type="button" data-die="d%">+d%</button>
        <button type="button" data-die="d12">+d12</button>
        <button type="button" data-die="d20">+d20</button>
        <span class="dice-separator" aria-hidden="true">|</span>
        <div id="dice-modifier">
          <label class="sr-only" for="dice-modifier-input">Modifier</label>
          <input id="dice-modifier-input" type="number" placeholder="±0" min="-9999" max="9999" />
        </div>
      </fieldset>
      <div class="dice-actions">
        <button id="dice-roll" type="button" disabled>Roll</button>
        <button id="dice-clear" type="button" disabled>Clear</button>
        <input type="color" id="dice-colour" title="Dice colour">
      </div>
    </form>
  </section>

  <section id="coin" aria-label="Coin flip">
    <div id="coin-display" aria-hidden="true">
      <div id="coin-inner">
        <div class="coin-face coin-heads">H</div>
        <div class="coin-face coin-tails">T</div>
      </div>
    </div>
    <output id="coin-result" aria-live="polite" aria-atomic="true"></output>
    <button id="coin-flip" type="button">Flip</button>
  </section>

  <section id="number" aria-label="Random number picker">
    <output id="number-result" aria-live="polite" aria-atomic="true" aria-label="Picked number"></output>
    <form id="number-controls">
      <label for="number-min">Min</label>
      <input id="number-min" type="number" value="1" min="-999999" max="999999" />
      <label for="number-max">Max</label>
      <input id="number-max" type="number" value="100" min="-999999" max="999999" />
      <button id="number-pick" type="button">Pick</button>
    </form>
  </section>

  <section id="history" aria-label="History">
    <ul id="history-list" role="log" aria-live="polite" aria-relevant="additions"></ul>
    <div class="history-actions">
      <button id="history-clear" type="button">Clear</button>
    </div>
  </section>

</div>
