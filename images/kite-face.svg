<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 7.8615137776 10">
  <!--
    The kite has two opposing angles of 90 degrees.
    The top-most angle is arccos((sqrt(5)-1)/2).
    The kite has height 10.
    The x-offset is: 5*sqrt((sqrt(5)-1)/2)
    The y-offset is: 5*(1+(sqrt(5)-1)/2)
  -->
  <path
    d="M 3.9307568888 0 7.8615137776 8.0901699437 L 3.9307568888 10 L 0 8.0901699437 Z"
